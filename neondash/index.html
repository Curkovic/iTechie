<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEONDASH // SYSTEM MONITOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Fira+Code:wght@400;600&display=swap');

        :root {
            --cp-yellow: #fcee0a;
            --cp-blue: #00f0ff;
            --cp-black: #050505;
            --cp-card: #0c0c0c;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--cp-black);
            color: var(--cp-yellow);
        }

        .neon-border {
            border: 1px solid var(--cp-yellow);
            box-shadow: 0 0 10px rgba(252, 238, 10, 0.2);
        }

        .card {
            background: var(--cp-card);
            border: 1px solid #222;
        }

        .text-neon { color: var(--cp-blue); text-shadow: 0 0 8px var(--cp-blue); }
        .font-mono { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body class="p-6">

    <header class="mb-8 border-b border-yellow-500 pb-4 flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-bold tracking-widest uppercase">NEONDASH // <span class="text-white">0.1</span></h1>
            <p class="font-mono text-sm mt-2 opacity-70">SYSTEM STATUS: <span class="text-green-500">ONLINE</span></p>
        </div>
        <div class="text-right font-mono text-xs opacity-50 uppercase tracking-widest">
            2026-07-22 23:59
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- CPU -->
        <div class="card p-5 neon-border rounded-none">
            <h2 class="text-xl uppercase font-bold mb-3">CPU Load</h2>
            <div class="text-4xl font-mono text-neon">2%</div>
            <div class="w-full bg-gray-900 h-2 mt-3"><div class="bg-yellow-500 h-2" style="width: 2%;"></div></div>
        </div>

        <!-- RAM -->
        <div class="card p-5 neon-border rounded-none">
            <h2 class="text-xl uppercase font-bold mb-3">Memory</h2>
            <div class="text-4xl font-mono text-neon">1 / 7,5 GB</div>
            <div class="w-full bg-gray-900 h-2 mt-3"><div class="bg-cyan-400 h-2" style="width: calc((1 / 7,5) * 100%);"></div></div>
        </div>

        <!-- DISK -->
        <div class="card p-5 neon-border rounded-none">
            <h2 class="text-xl uppercase font-bold mb-3">Storage</h2>
            <div class="flex justify-between text-lg font-mono text-white mb-1"><span>OS:</span> <span class="text-neon">124G/458G</span></div>
            <div class="flex justify-between text-lg font-mono text-white"><span>EXT:</span> <span class="text-neon">2,2T/3,7T</span></div>
        </div>

        <!-- IP -->
        <div class="card p-5 neon-border rounded-none">
            <h2 class="text-xl uppercase font-bold mb-3">Local IP</h2>
            <div class="text-2xl font-mono text-neon">192.168.1.45</div>
        </div>
    </div>

    <div class="mt-8 card p-6 neon-border rounded-none">
        <h2 class="text-2xl uppercase font-bold mb-4">Process Table</h2>
        <div class="font-mono text-sm overflow-x-auto">
            <table class="w-full text-left">
                <tr class="border-b border-gray-800 text-gray-500">
                    <th class="p-2 w-16">PID</th><th class="p-2">NAME</th><th class="p-2 w-20">CPU</th><th class="p-2 w-20">MEM</th>
                </tr>
                <tr class="border-b border-gray-900">
                    <td class="p-2 text-white">107954</td><td class="p-2">qbittorrent</td><td class="p-2 text-neon">1.0%</td><td class="p-2 text-neon">1.7%</td>
                </tr>
                <tr class="border-b border-gray-900">
                    <td class="p-2 text-white">1809</td><td class="p-2">dropbox</td><td class="p-2 text-neon">0.9%</td><td class="p-2 text-neon">2.6%</td>
                </tr>
            </table>
        </div>
    </div>

</body>
</html>
