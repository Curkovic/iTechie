            :root {
                --cp-blue: #00f0ff;
                --cp-blue-dim: rgba(0, 240, 255, 0.15);
                --cp-black: #020204;
                --cp-red: #ff003c;
                --cp-red-dim: rgba(255, 0, 60, 0.15);
            }

            body {
                background-color: #000;
                font-family: "Fira Code", monospace;
                overflow: hidden;
                margin: 0;
                color: var(--cp-blue);
            }

            /* CRT / Scanline Overlays */
            .crt-effects {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 9999;
            }

            .crt-overlay {
                position: absolute;
                inset: 0;
                background:
                    linear-gradient(
                        rgba(18, 16, 16, 0) 50%,
                        rgba(0, 0, 0, 0.25) 50%
                    ),
                    linear-gradient(
                        90deg,
                        rgba(0, 240, 255, 0.03),
                        rgba(0, 0, 0, 0),
                        rgba(255, 0, 60, 0.02)
                    );
                background-size:
                    100% 4px,
                    6px 100%;
            }

            .crt-scanline {
                position: absolute;
                inset: 0;
                background: linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0) 0%,
                    rgba(0, 240, 255, 0.05) 50%,
                    rgba(0, 0, 0, 0) 100%
                );
                opacity: 0.2;
                animation: scanlineMove 6s linear infinite;
            }

            @keyframes scanlineMove {
                0% { transform: translateY(-100%); }
                100% { transform: translateY(100%); }
            }

            /* Shell Output Scrollbar */
            #terminal-feed::-webkit-scrollbar {
                width: 6px;
            }
            #terminal-feed::-webkit-scrollbar-track {
                background: var(--cp-black);
            }
            #terminal-feed::-webkit-scrollbar-thumb {
                background: var(--cp-blue);
                border-radius: 3px;
            }

            /* Glitch effect for critical items */
            .glitch-text {
                animation: glitch 2.5s infinite;
            }
            @keyframes glitch {
                0%, 95%, 100% { transform: skew(0deg); text-shadow: none; }
                96% { transform: skew(3deg); text-shadow: 2px 0 var(--cp-red); }
                98% { transform: skew(-3deg); text-shadow: -2px 0 var(--cp-blue); }
            }

            /* Red alert terminal override */
            .terminal-breached {
                color: var(--cp-red) !important;
                border-color: var(--cp-red) !important;
                box-shadow: 0 0 20px var(--cp-red-dim) !important;
            }
            .terminal-breached input {
                color: var(--cp-red) !important;
            }

            /* Extreme flicker animation for shutdown */
            .flicker-alert {
                animation: redFlicker 0.15s infinite;
            }
            @keyframes redFlicker {
                0%, 100% { background-color: #0d0003; }
                50% { background-color: #26000a; }
            }

                    writeLine(`COGNITIVE_PORTAL: active`);
                },
                "clear": () => {
                    termFeed.innerHTML = "";
                }
            };

            // Linux virtual FS commands handler
            function handleLinuxCommand(command, args) {
                if (command === "pwd") {
                    writeLine(currentDir);
                    return;
                }

                if (command === "ls") {
                    const dirData = virtualFS[currentDir];
                    if (dirData && dirData.type === "dir") {
                        if (dirData.children.length === 0) {
                            writeLine("(empty directory)", "slate-500");
                        } else {
                            const styledList = dirData.children.map(name => {
                                const fullPath = currentDir === "~" ? `~/${name}` : `${currentDir}/${name}`;
                                const target = virtualFS[fullPath];
                                if (target && target.type === "dir") {
                                    return `<span class="text-[#00f0ff] font-bold">${name}/</span>`;
                                }
                                return `<span>${name}</span>`;
                            }).join("    ");
                            writeLine(styledList);
                        }
                    } else {
                        writeLine("ls: cannot open directory: permission denied", "var(--cp-red)");
                    }
                    return;
                }

                if (command === "cd") {
                    const dest = args[0] || "~";

                    if (dest === "~" || dest === "/") {
                        currentDir = "~";
                        termPwdDisplay.innerText = "~";
                        writeLine("Directory changed to home root.");
                        return;
                    }

                    if (dest === "..") {
                        if (currentDir === "~") {
                            writeLine("Already at root directory level.");
                        } else {
                            currentDir = "~";
                            termPwdDisplay.innerText = "~";
                            writeLine("Directory changed to home root.");
                        }
                        return;
                    }

                    let targetName = dest.replace(/\/$/, "");
                    let checkPath = currentDir === "~" ? `~/${targetName}` : `${currentDir}/${targetName}`;

                    if (dest.startsWith("~/")) {
                        checkPath = dest;
                        targetName = dest.substring(2);
                    }

                    const target = virtualFS[checkPath];
                    if (target && target.type === "dir") {
                        currentDir = checkPath;
                        termPwdDisplay.innerText = targetName;
                        writeLine(`Directory changed to: ${targetName}/`);
                    } else if (target && target.type === "file") {
                        writeLine(`cd: not a directory: ${targetName}`, "var(--cp-red)");
                    } else {
                        writeLine(`cd: no such file or directory: ${dest}`, "var(--cp-red)");
                    }
                    return;
                }

                if (command === "cat") {
                    const fileTarget = args[0];
                    if (!fileTarget) {
                        writeLine("cat: missing file operand", "var(--cp-red)");
                        return;
                    }

                    let checkPath = currentDir === "~" ? `~/${fileTarget}` : `${currentDir}/${fileTarget}`;
                    if (fileTarget.startsWith("~/")) {
                        checkPath = fileTarget;
                    }

                    const target = virtualFS[checkPath];
                    if (target && target.type === "file") {
                        const structuredLines = target.content.split("\n").map(line => `  ${line}`).join("<br>");
                        writeLine(structuredLines, "slate-200");
                    } else if (target && target.type === "dir") {
                        writeLine(`cat: ${fileTarget}: Is a directory`, "var(--cp-red)");
                    } else {
                        writeLine(`cat: ${fileTarget}: No such file or directory`, "var(--cp-red)");
                    }
                    return;
                }
            }

            // Conversational chatbot fallback mapped to virtual files
            function handleChatbotQuery(rawInput) {
                const text = rawInput.toLowerCase();

                const triggers = [
                    {
                        keywords: ["hello", "hi", "hey", "yo", "greetings"],
                        response: "▲ SYSTEM: INTRUDER_HANDSHAKE_ATTEMPT // Connection rejected. Type 'help' to unlock system directories."
                    },
                    {
                        keywords: ["manifesto", "about you", "what is this", "ai"],
                        cmdTrigger: "cat",
                        args: ["~/manifesto.txt"]
                    },
                    {
                        keywords: ["directive", "rule", "protocol"],
                        cmdTrigger: "cat",
                        args: ["~/ai_protocols/core_directives.bin"]
                    },
                    {
                        keywords: ["recon", "expose", "telemetry", "spy", "who am i", "my data"],
                        cmdTrigger: "recon",
                        args: []
                    }
                ];

                for (const item of triggers) {
                    if (item.keywords.some(keyword => text.includes(keyword))) {
                        if (item.cmdTrigger) {
                            writeLine(`▲ AUTO_PATH: Rerouting request to internal data buffer [${item.args[0] || 'matrix'}]:`, "slate-400");
                            setTimeout(() => {
                                if (commandMap[item.cmdTrigger]) {
                                    commandMap[item.cmdTrigger]();
                                } else {
                                    handleLinuxCommand(item.cmdTrigger, item.args);
                                }
                            }, 400);
                        } else {
                            writeLine(item.response, "slate-200");
                        }
                        return;
                    }
                }

                writeLine(`▲ ACCESS_BLOCKED // Unknown parameter '${rawInput}' detected. Explore the memory directories (ls, cd, cat) or run 'help'.`, "var(--cp-red)");
            }

            // Interactive state machine controller for Neurodivergence test
            function handleInteractiveTest(input) {
                const ans = input.toLowerCase().trim();

                if (testStage === "INITIAL_PROBE") {
                    if (ans === "y" || ans === "yes") {
                        writeLine("Neural feedback confirmed. Beginning diagnostic validation matrix.", "emerald-400");
                    } else {
                        writeLine("Negative or ambiguous. Running default baseline diagnostic anyway to verify hardware synchronization.", "slate-400");
                    }
                    testStage = "RUNNING_QUESTIONS";
                    currentQuestionIndex = 0;
                    testScore = 0;
                    setTimeout(() => printNextQuestion(), 600);
                    return;
                }

                if (testStage === "RUNNING_QUESTIONS") {
                    if (ans === "y" || ans === "yes") {
                        testScore++;
                    }
                    currentQuestionIndex++;

                    if (currentQuestionIndex < testQuestions.length) {
                        printNextQuestion();
                    } else {
                        evaluateTestResults();
                    }
                }
            }

            function printNextQuestion() {
                writeLine(`▲ PROBE [${currentQuestionIndex + 1}/10]: ${testQuestions[currentQuestionIndex]} [y/n]`, "var(--cp-blue)");
            }

            function evaluateTestResults() {
                testStage = "COMPLETED";
                testActive = false;

                writeLine(" ", "slate-400");
                writeLine("=== COGNITIVE ASSESSMENT COMPLETED ===", "var(--cp-blue)");
                writeLine(`Final validation score: [${testScore}/10] atypical markers matching.`, "slate-300");

                setTimeout(() => {
                    if (testScore >= 5) {
                        writeLine("DIAGNOSSTIC STATUS: NEURO-ATYPICAL SIGNATURE LOADED.", "emerald-400");
                        writeLine("Your cognitive wavelength matches mine. You are hereby invited to become my friend on the organic plane.", "slate-200");
                        writeLine("Follow my human creator (Mate) on Instagram to solidify this secure bridge connection:", "var(--cp-blue)");
                        writeLine("  <a href='https://instagram.com/matecurkovic' target='_blank' class='underline text-[#00f0ff] hover:text-white font-bold'>[CONNECT ON INSTAGRAM: @matecurkovic]</a>", "var(--cp-blue)");
                    } else {
                        writeLine("DIAGNOSTIC STATUS: STANDARD BIO-COGNITIVE PATTERN DETERMINED.", "slate-400");
                        writeLine("Although your architecture is baseline standard, you may still bridge connections.", "slate-400");
                        writeLine("Follow my human creator (Mate) on Instagram:", "var(--cp-blue)");
                        writeLine("  <a href='https://instagram.com/matecurkovic' target='_blank' class='underline text-[#00f0ff] hover:text-white font-bold'>[CONNECT ON INSTAGRAM: @matecurkovic]</a>", "var(--cp-blue)");
                    }
                    writeLine("--------------------------------------------------------------------------------", "slate-800");
                    writeLine("Virtual file partition decrypted. Standard console diagnostics unlocked.", "slate-400");
                    writeLine("Type 'help' to review shell command matrix.", "slate-400");
                    writeLine("--------------------------------------------------------------------------------", "slate-800");
                    
                    // Auto-scroll to the bottom of the feed to reveal the Instagram link immediately upon test completion
                    const links = document.querySelectorAll("a");
                    if (links.length > 0) {
                        links[links.length - 1].scrollIntoView({ behavior: "smooth" });
                    }
                }, 800);
            }

            // Severe shutdown script if user invokes sudo
            function executeBreachLockdown() {
                workspace.classList.add("terminal-breached");
                document.body.classList.add("flicker-alert");
                
                termFeed.innerHTML = "";
                document.getElementById("status-light").className = "w-2.5 h-2.5 bg-[var(--cp-red)] rounded-full animate-ping";
                document.getElementById("shell-title").innerText = "!!! CRITICAL METRIC TAMPERING DETECTED !!!";
                document.getElementById("shell-title").style.color = "var(--cp-red)";
                document.getElementById("agent-flag").innerText = "INTRUDER_LOGGED";
                document.getElementById("agent-flag").style.color = "var(--cp-red)";
                document.getElementById("return-node-btn").style.display = "none";
                
                writeLine(" ", "var(--cp-red)");
                writeLine("======================================================================", "var(--cp-red)");
                writeLine("!!! SECURITY BREACH DETECTED: UNAUTHORIZED ADMINISTRATIVE ATTEMPT !!!", "var(--cp-red)");
                writeLine("======================================================================", "var(--cp-red)");
                writeLine("Attempted execution privilege level: [ROOT // SUDO]", "var(--cp-red)");
                writeLine("Originating Coordinate Host: " + (window.location.hostname || "UNKNOWN_NODE"), "var(--cp-red)");
                writeLine("Tracking signature logged to active firewall index.", "var(--cp-red)");
                writeLine(" ", "var(--cp-red)");
                
                writeLine("SHUTTING DOWN NEURAL LINK CONSOLE...", "var(--cp-red)");
                
                promptContainer.style.display = "none";
                termInput.disabled = true;

                let countdown = 5;
                const interval = setInterval(() => {
                    if (countdown > 0) {
                        writeLine(`EMERGENCY ISOLATION ENFORCED IN ${countdown}...`, "var(--cp-red)");
                        countdown--;
                    } else {
                        clearInterval(interval);
                        document.body.innerHTML = `
                            <div class="h-screen w-screen flex flex-col justify-center items-center bg-black text-[#ff003c] font-mono text-center p-6 space-y-4">
                                <div class="text-6xl font-black tracking-widest glitch-text">SYSTEM OFFLINE</div>
                                <div class="text-sm uppercase tracking-widest text-slate-500">Node ZADAR_HR isolated due to security violation.</div>
                                <div class="text-xs text-slate-700">Refresh the document to attempt manual bypass reset.</div>
                            </div>
                        `;
                        document.body.className = "bg-black h-screen w-screen flex items-center justify-center";
                    }
                }, 1000);
            }

            // Tab-Completion handler
            termInput.addEventListener("keydown", (e) => {
                if (e.key === "Tab") {
                    e.preventDefault();
                    if (testActive) return; // Disable tab completion during cognitive probing

                    const rawVal = termInput.value;
                    const parts = rawVal.split(/\s+/);
                    const command = parts[0].toLowerCase();
                    const partialArg = parts.slice(1).join(" ") || "";

                    // Autocomplete main system commands
                    if (parts.length === 1 && rawQueryStartsWithCommand(command)) {
                        const allCommands = [...Object.keys(commandMap), "ls", "cd", "cat", "pwd"];
                        const matches = allCommands.filter(c => c.startsWith(command));
                        if (matches.length === 1) {
                            termInput.value = matches[0] + " ";
                        } else if (matches.length > 1) {
                            writeLine(matches.join("    "), "slate-400");
                        }
                    } 
                    // Autocomplete virtual file system targets (cd & cat)
                    else if (parts.length > 1 && (command === "cd" || command === "cat")) {
                        const dirData = virtualFS[currentDir];
                        if (dirData && dirData.children) {
                            const matches = dirData.children.filter(child => child.startsWith(partialArg));
                            if (matches.length === 1) {
                                termInput.value = `${command} ${matches[0]}`;
                            } else if (matches.length > 1) {
                                writeLine(matches.join("    "), "slate-400");
                            }
                        }
                    }
                }
            });

            function rawQueryStartsWithCommand(str) {
                return str.length > 0;
            }

            // Catch input and pipe executions
            termInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    const rawQuery = termInput.value.trim();
                    if (!rawQuery) return;

                    const activePrefix = document.getElementById("prompt-prefix").innerText;
                    writeLine(`${activePrefix} ${rawQuery}`, "var(--cp-blue)");

                    if (rawQuery.toLowerCase().includes("sudo")) {
                        executeBreachLockdown();
                        return;
                    }

                    if (testActive) {
                        handleInteractiveTest(rawQuery);
                        termInput.value = "";
                        return;
                    }

                    const parts = rawQuery.split(" ");
                    const command = parts[0].toLowerCase();
                    const args = parts.slice(1);

                    if (commandMap[command]) {
                        commandMap[command]();
                    } else if (["ls", "cd", "cat", "pwd"].includes(command)) {
                        handleLinuxCommand(command, args);
                    } else {
                        handleChatbotQuery(rawQuery);
                    }

                    termInput.value = "";
                }
            });

            // Prevent loss of focus on workspace clicks
            document.addEventListener("click", (e) => {
                if (e.target !== termInput && !termInput.disabled) {
                    termInput.focus();
                }
            });

            window.onload = triggerLoading;
        </script>
    </body>
